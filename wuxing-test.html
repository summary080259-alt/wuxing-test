<form id="quiz"></form>

<button onclick="calculate()">查看結果</button>

<div id="result" class="resultbox"></div>

{q:"12. 當團隊發生衝突",o:[

{q:"23. 在壓力下你",o:[

{q:"24. 你最嚮往",o:[

]},

{q:"25. 整體而言你是",o:[
["開創型","wood"],
["熱情型","fire"],
["穩定型","earth"],
["理性型","metal"],
["思考型","water"]
]}

]

let quiz=document.getElementById("quiz")

questions.forEach((q,i)=>{

let div=document.createElement("div")
div.className="question"

let html="<b>"+q.q+"</b><br>"

q.o.forEach(opt=>{
html+=`<input type="radio" name="q${i}" value="${opt[1]}"> ${opt[0]}<br>`
})

div.innerHTML=html
quiz.appendChild(div)

})

function calculate(){

let score={wood:0,fire:0,earth:0,metal:0,water:0}

questions.forEach((q,i)=>{

let radios=document.getElementsByName("q"+i)

radios.forEach(r=>{
if(r.checked){
score[r.value]++
}
})

})

let total=25

let percent={
wood:Math.round(score.wood/total*100),
fire:Math.round(score.fire/total*100),
earth:Math.round(score.earth/total*100),
metal:Math.round(score.metal/total*100),
water:Math.round(score.water/total*100)
}

let sorted=Object.entries(score).sort((a,b)=>b[1]-a[1])

let main=sorted[0][0]
let second=sorted[1][0]

const desc={
wood:"木型人格：開創、成長、行動力強。",
fire:"火型人格：熱情、外向、感染力強。",
earth:"土型人格：穩定、可靠、重視關係。",
metal:"金型人格：理性、嚴謹、重視規則。",
water:"水型人格：智慧、洞察、思考深入。"
}

document.getElementById("result").innerHTML=

"<h2>測驗結果</h2>"+
"木："+percent.wood+"%<br>"+
"火："+percent.fire+"%<br>"+
"土："+percent.earth+"%<br>"+
"金："+percent.metal+"%<br>"+
"水："+percent.water+"%<br><br>"+
"<b>主要人格：</b>"+main+"<br>"+desc[main]+"<br><br>"+
"<b>次要人格：</b>"+second+"<br>"+desc[second]

}

</script>

</body>
